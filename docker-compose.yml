services:
  # Builds the fp-go sandbox image used by codapi at runtime via docker.sock.
  # Not started as a container — activate with `--profile build` when (re)building.
  sandbox:
    profiles: ["build"]
    build:
      context: .
      dockerfile: Dockerfile
    image: fpgo-sandbox:latest

  codapi:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: codapi-server:latest
    ports:
      - "1313:1313"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # codapi writes sandbox files to /tmp inside this container, then asks
      # the host docker daemon to bind-mount that path into the sandbox
      # container. Host and container must see the same /tmp for that to work.
      - /tmp:/tmp
    restart: unless-stopped
    networks:
      - codapi-network

networks:
  codapi-network:
    driver: bridge
