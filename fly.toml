# Fly.io configuration for fp-go Codapi sandbox
# See https://fly.io/docs/reference/configuration/

app = "fpgo-sandbox"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile.fly"

[http_service]
  internal_port = 1313
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
